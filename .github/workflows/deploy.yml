name: Enterprise RAG CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/harrygenai_enterprise-rag:latest .

    - name: Push Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/harrygenai_enterprise-rag:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/harrygenai_enterprise-rag:latest
          docker stop enterprise-rag || true
          docker rm enterprise-rag || true
          docker run -d -p 8000:8000 --name enterprise-rag ${{ secrets.DOCKER_USERNAME }}/harrygenai_enterprise-rag:latest